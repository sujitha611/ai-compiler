<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI App Compiler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; padding: 40px 20px; }
        h1 { text-align: center; color: #a78bfa; margin-bottom: 10px; font-size: 2rem; }
        p.sub { text-align: center; color: #888; margin-bottom: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        textarea { width: 100%; height: 120px; background: #1e1e2e; border: 1px solid #333; border-radius: 10px; padding: 15px; color: #fff; font-size: 1rem; resize: none; }
        button { width: 100%; margin-top: 15px; padding: 15px; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; cursor: pointer; }
        button:hover { background: #6d28d9; }
        #status { text-align: center; margin-top: 15px; color: #a78bfa; font-size: 0.95rem; }
        #output { margin-top: 20px; background: #1e1e2e; border-radius: 10px; padding: 20px; border: 1px solid #333; }
        pre { white-space: pre-wrap; word-wrap: break-word; color: #a3e635; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI App Compiler</h1>
        <p class="sub">Natural Language → App Schema</p>
        <textarea id="prompt" placeholder="e.g. Build a CRM with login, contacts, dashboard and role-based access..."></textarea>
        <button onclick="generate()">⚡ Generate Schema</button>
        <div id="status"></div>
        <div id="output" style="display:none">
            <pre id="result"></pre>
        </div>
    </div>
    <script>
        async function generate() {
            const prompt = document.getElementById("prompt").value;
            if (!prompt) { alert("Enter a prompt!"); return; }
            document.getElementById("status").innerText = "⏳ Generating... please wait (30-60 sec)";
            document.getElementById("output").style.display = "none";
            try {
                const res = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                document.getElementById("status").innerText = data.success ? "✅ Done!" : "❌ Error!";
                document.getElementById("result").innerText = JSON.stringify(data.output || data.error, null, 2);
                document.getElementById("output").style.display = "block";
            } catch(e) {
                document.getElementById("status").innerText = "❌ Failed: " + e.message;
            }
        }
    </script>
</body>
</html>
